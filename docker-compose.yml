version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: avicola-backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    env_file:
      - ./backend/.env
    networks:
      - avicola-net

  ubuntu:
    image: ubuntu:20.04
    container_name: avicola-ubuntu
    command: sleep infinity  # Mantiene el contenedor corriendo
    tty: true
    stdin_open: true
    volumes:
      - ./shared:/mnt/shared
    networks:
      - avicola-net

networks:
  avicola-net:
